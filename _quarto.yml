project:
  type: website
  render:
    - "*.qmd"
  post-render: quarto/scripts/restoreMarkdownToHeirarchy.sh
  #resources:

website:
  title: "Effective Python: Notes"
  page-navigation: true
  open-graph: true
  navbar:
    search: true
    left:
      - href: index.qmd
        text: Home
  sidebar:
    style: "docked"
    collapse-level: 1
    search: true
    contents:
      - section: Chapter_01/Chapter_01.qmd
        contents:
          - Chapter_01/Item_001/item_001.qmd
          - Chapter_01/Item_002/item_002.qmd
          - Chapter_01/Item_003/item_003.qmd
          - Chapter_01/Item_004/item_004.qmd
          - Chapter_01/Item_005/item_005.qmd
          - Chapter_01/Item_006/item_006.qmd
          - Chapter_01/Item_007/item_007.qmd
          - Chapter_01/Item_008/item_008.qmd
          - Chapter_01/Item_009/item_009.qmd
      - section: Chapter_02/Chapter_02.qmd
        contents:
          - Chapter_02/Item_010/item_010.qmd
          - Chapter_02/Item_011/item_011.qmd
          - Chapter_02/Item_012/item_012.qmd
          - Chapter_02/Item_013/item_013.qmd
          - Chapter_02/Item_014/item_014.qmd
          - Chapter_02/Item_015/item_015.qmd
          - Chapter_02/Item_016/item_016.qmd
format:
  html:
    code-fold: false
    code-links:
      - repo
      - binder
  gfm:
    filters:
      - quarto/scripts/strip_ansi.lua
  ipynb: default
toc: true
toc-depth: 6
format-links: false
execute:
  enabled: true
  error: true
engine: jupyter
