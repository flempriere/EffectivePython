project:
  type: website
  render:
    - "*.qmd"
  post-render: quartoScripts/restoreMarkdownToRepositoryHierachy.sh
  #resources:

website:
  title: "Effective Python: Notes"
  open-graph: true
  navbar:
    search: true
    left:
      - href: index.qmd
        text: Home
  sidebar:
    style: "docked"
    search: true
    contents:
format:
  html:
    code-fold: false
    code-links: repo
  gfm:
    filters:
      - quarto/scripts/remove_ansi.lua
toc: true
toc-depth: 6
format-links: false
execute:
  enabled: true
  error: true
engine: jupyter
